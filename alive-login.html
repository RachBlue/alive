<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #f5f0e8;
    --warm-white: rgba(250, 246, 240, 0.92);
    --text-dark: #1a1410;
    --text-mid: #4a3f35;
    --accent: #c17f4a;
    --accent-light: rgba(193, 127, 74, 0.15);
    --glass: rgba(250, 246, 240, 0.12);
    --glass-border: rgba(250, 246, 240, 0.25);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* VIDEO BACKGROUND */
  .video-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .video-bg video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Simulated video with animated scenes since we can't load real video */
  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    background-size: cover;
    background-position: center;
  }

  .scene.active { opacity: 1; }

  .scene-1 {
    background: linear-gradient(135deg, #2c1810 0%, #5c3520 30%, #8b5a3a 60%, #c4854a 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .scene-2 {
    background: linear-gradient(160deg, #0d1b2a 0%, #1a3a4a 40%, #2d6a7a 70%, #4a9aaa 100%);
  }
  .scene-3 {
    background: linear-gradient(120deg, #1a2410 0%, #2d4420 35%, #4a7040 65%, #7aaa60 100%);
  }
  .scene-4 {
    background: linear-gradient(145deg, #1a1020 0%, #3a2040 35%, #6a4070 65%, #9a70aa 100%);
  }

  /* Scene content - illustrated people/activities */
  .scene-people {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .person {
    position: absolute;
    border-radius: 50% 50% 45% 45%;
    animation: sway 4s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(-8px); }
  }

  /* Grain overlay */
  .grain {
    position: fixed;
    inset: -50%;
    width: 200%; height: 200%;
    z-index: 1;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    animation: grain-move 0.5s steps(1) infinite;
  }

  @keyframes grain-move {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-2%, -3%); }
    50% { transform: translate(1%, 2%); }
    75% { transform: translate(3%, -1%); }
    100% { transform: translate(-1%, 3%); }
  }

  /* Warm vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(15, 8, 3, 0.7) 100%);
    pointer-events: none;
  }

  /* Warm color grade overlay */
  .color-grade {
    position: fixed;
    inset: 0;
    z-index: 3;
    background: linear-gradient(180deg, rgba(20, 10, 5, 0.3) 0%, rgba(40, 20, 5, 0.15) 50%, rgba(20, 10, 5, 0.4) 100%);
    pointer-events: none;
  }

  /* MAIN LAYOUT */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 48px 24px;
  }

  /* TOP — wordmark */
  .wordmark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fade-up 1.2s ease forwards 0.4s;
  }

  .wordmark-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 10vw, 88px);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: var(--cream);
    line-height: 1;
    text-shadow: 0 2px 40px rgba(193, 127, 74, 0.4);
  }

  .wordmark-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.35em;
    color: rgba(245, 240, 232, 0.55);
    text-transform: uppercase;
  }

  /* MIDDLE — scene label */
  .scene-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fade-up 1.2s ease forwards 0.8s;
  }

  .scene-caption {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(18px, 3.5vw, 26px);
    font-weight: 300;
    color: rgba(245, 240, 232, 0.75);
    letter-spacing: 0.04em;
    text-align: center;
    min-height: 36px;
    transition: opacity 0.8s ease;
  }

  .scene-dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(245, 240, 232, 0.3);
    transition: background 0.4s ease, transform 0.4s ease;
  }

  .dot.active {
    background: var(--accent);
    transform: scale(1.4);
  }

  /* BOTTOM — login card */
  .login-card {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    animation: fade-up 1.2s ease forwards 1.2s;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    padding: 16px 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.02em;
    outline: none;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .input-wrap input::placeholder {
    color: rgba(245, 240, 232, 0.4);
  }

  .input-wrap input:focus {
    border-color: rgba(193, 127, 74, 0.5);
    background: rgba(250, 246, 240, 0.16);
  }

  .btn-primary {
    width: 100%;
    padding: 17px 20px;
    background: var(--cream);
    border: none;
    border-radius: 14px;
    color: var(--text-dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .btn-primary:active { transform: translateY(0); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--glass-border);
  }

  .divider-text {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: rgba(245, 240, 232, 0.35);
    text-transform: uppercase;
  }

  .btn-secondary {
    width: 100%;
    padding: 16px 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: rgba(245, 240, 232, 0.8);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.04em;
    cursor: pointer;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: border-color 0.3s ease, background 0.3s ease, transform 0.2s ease;
  }

  .btn-secondary:hover {
    border-color: rgba(193, 127, 74, 0.4);
    background: rgba(250, 246, 240, 0.16);
    transform: translateY(-1px);
  }

  .signup-prompt {
    text-align: center;
    font-size: 12px;
    font-weight: 300;
    color: rgba(245, 240, 232, 0.4);
    letter-spacing: 0.03em;
  }

  .signup-prompt a {
    color: rgba(193, 127, 74, 0.85);
    text-decoration: none;
    transition: color 0.2s;
  }

  .signup-prompt a:hover { color: var(--accent); }

  /* ANIMATIONS */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Animated scene illustrations */
  .scene-1 .scene-people::before {
    content: '';
    position: absolute;
    bottom: 15%; left: 50%;
    transform: translateX(-50%);
    width: 340px; height: 180px;
    background: radial-gradient(ellipse, rgba(255,200,140,0.15) 0%, transparent 70%);
    border-radius: 50%;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
    50% { transform: translateX(-50%) scale(1.1); opacity: 1; }
  }

  /* Floating light particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(193, 127, 74, 0.6);
    animation: float-up linear infinite;
  }

  @keyframes float-up {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<!-- VIDEO BACKGROUND (scenes) -->
<div class="video-bg">
  <div class="scene scene-1 active" id="s1">
    <div class="scene-people"></div>
  </div>
  <div class="scene scene-2" id="s2"></div>
  <div class="scene scene-3" id="s3"></div>
  <div class="scene scene-4" id="s4"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- GRAIN -->
<div class="grain"></div>

<!-- VIGNETTE -->
<div class="vignette"></div>
<div class="color-grade"></div>

<!-- LOGIN SCREEN -->
<div class="screen">

  <!-- Wordmark -->
  <div class="wordmark">
    <div class="wordmark-text">alive</div>
    <div class="wordmark-sub">be here. for real.</div>
  </div>

  <!-- Scene caption -->
  <div class="scene-label">
    <div class="scene-caption" id="caption">pottery classes on a Sunday morning</div>
    <div class="scene-dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-card">
    <div class="input-wrap">
      <input type="email" placeholder="your email" autocomplete="off" />
    </div>
    <div class="input-wrap">
      <input type="password" placeholder="password" />
    </div>
    <button class="btn-primary">Come Alive</button>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>
    <button class="btn-secondary">Continue with Apple</button>
    <div class="signup-prompt">
      New here? <a href="#">Join the community →</a>
    </div>
  </div>

</div>

<script>
  // Scene cycling
  const scenes = ['s1','s2','s3','s4'];
  const dots = ['d0','d1','d2','d3'];
  const captions = [
    'pottery classes on a Sunday morning',
    'run club in Central Park at dawn',
    'late night dinners that go until 2am',
    'making music with strangers who become friends'
  ];

  let current = 0;

  function nextScene() {
    document.getElementById(scenes[current]).classList.remove('active');
    document.getElementById(dots[current]).classList.remove('active');
    current = (current + 1) % scenes.length;
    document.getElementById(scenes[current]).classList.add('active');
    document.getElementById(dots[current]).classList.add('active');
    const cap = document.getElementById('caption');
    cap.style.opacity = '0';
    setTimeout(() => {
      cap.textContent = captions[current];
      cap.style.opacity = '1';
    }, 400);
  }

  setInterval(nextScene, 4000);

  // Floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 12 + 10}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: ${Math.random() * 0.4 + 0.1};
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
